<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Wander Globe</title>
<style>
  html,body{margin:0;height:100%;background:#0b1220;overflow:hidden;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  #globeViz{width:100vw;height:100vh}
  #hud{position:fixed;left:0;right:0;bottom:0;padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(9,15,26,.92),rgba(9,15,26,0));color:#fff;display:flex;align-items:center;gap:10px}
  #hudText{flex:1;font-size:13px;line-height:1.3}
  #hudText b{font-size:14px}
  #hudText small{color:#9db4cc;display:block}
  #goBtn{background:#185FA5;color:#fff;border:none;border-radius:10px;padding:11px 16px;font-weight:700;font-size:14px;cursor:pointer;opacity:.45;pointer-events:none;transition:opacity .15s}
  #goBtn.on{opacity:1;pointer-events:auto}
  #hint{position:fixed;top:14px;left:0;right:0;text-align:center;color:#cfe0f2;font-size:12.5px;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  #err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;color:#cfe0f2;font-size:14px;text-align:center;padding:24px}
</style>
</head>
<body>
  <div id="globeViz"></div>
  <div id="hint">Spin the globe — tap anywhere to drop a pin</div>
  <div id="err">Couldn’t load the 3D globe (no connection?). Use the map instead.</div>
  <div id="hud">
    <div id="hudText"><b>Tap the globe</b><small>Pick a spot to teleport</small></div>
    <button id="goBtn">Teleport here</button>
  </div>

  <script src="vendor/three.min.js"></script>
  <script src="vendor/globe.gl.min.js"></script>
  <script>
  (function(){
    var picked=null;
    var hudText=document.getElementById('hudText'), goBtn=document.getElementById('goBtn');

    function fmt(n){ return (Math.round(n*10000)/10000).toFixed(4); }

    // Deliver the chosen coordinate to whatever host is embedding this page.
    function deliver(lat,lng){
      // Desktop: embedded in a same-origin iframe → call the parent's handler.
      try{ if(window.parent && window.parent!==window && window.parent.wanderGlobePick){ window.parent.wanderGlobePick(lat,lng); return; } }catch(e){}
      try{ if(window.wanderGlobePick){ window.wanderGlobePick(lat,lng); return; } }catch(e){}
      // iOS WKWebView message handler
      try{ if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.wanderGlobe){
        window.webkit.messageHandlers.wanderGlobe.postMessage({lat:lat,lng:lng}); return; } }catch(e){}
      // Android JS interface
      try{ if(window.WanderGlobe&&window.WanderGlobe.pick){ window.WanderGlobe.pick(lat,lng); return; } }catch(e){}
      // Fallback: a custom URL scheme the host can intercept
      try{ window.location.href='wanderglobe://pick?lat='+lat+'&lng='+lng; }catch(e){}
    }

    if(!window.Globe){ document.getElementById('err').style.display='flex'; return; }

    var world = Globe()
      .globeImageUrl('vendor/earth-blue-marble.jpg')
      .bumpImageUrl('vendor/earth-topology.png')
      .backgroundColor('#0b1220')
      .showAtmosphere(true).atmosphereColor('#4a90d9').atmosphereAltitude(0.18)
      (document.getElementById('globeViz'));

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.35;

    // Zoom limits. The globe radius is 100 units. Diving right onto the surface (minDistance ~104)
    // stretches even the 4K Earth texture into a blurry mush — there's no street-level detail on a
    // globe texture, so getting that close just looks broken. Cap the closest zoom to a crisp
    // country/region view; the user picks a spot here, then teleports to the real map for detail.
    world.controls().enableZoom = true;
    world.controls().minDistance = 148;
    world.controls().maxDistance = 500;
    world.controls().zoomSpeed = 1.1;

    // Sharpen the texture at grazing angles (poles / globe edge) with anisotropic filtering, once
    // globe.gl has loaded the material's map. Cheap and removes the smeared look near the horizon.
    setTimeout(function(){
      try{
        var mat = world.globeMaterial && world.globeMaterial();
        if(mat && mat.map && world.renderer){
          mat.map.anisotropy = world.renderer().capabilities.getMaxAnisotropy();
          mat.map.needsUpdate = true;
        }
      }catch(e){}
    }, 1200);

    function setPin(lat,lng){
      picked={lat:lat,lng:lng};
      world.pointsData([{lat:lat,lng:lng}])
        .pointColor(function(){return '#ff4d4f';}).pointAltitude(0.02).pointRadius(0.6);
      hudText.innerHTML='<b>'+fmt(lat)+', '+fmt(lng)+'</b><small>Tap “Teleport here” to go</small>';
      goBtn.classList.add('on');
      world.controls().autoRotate=false;
    }

    world.onGlobeClick(function(coords){ if(coords) setPin(coords.lat, coords.lng); });

    goBtn.addEventListener('click', function(){ if(picked) deliver(picked.lat, picked.lng); });

    function resize(){ world.width(window.innerWidth).height(window.innerHeight); }
    window.addEventListener('resize', resize); resize();
    setTimeout(function(){ var h=document.getElementById('hint'); if(h) h.style.opacity='0'; h.style.transition='opacity 1s'; }, 4000);
  })();
  </script>
</body>
</html>
