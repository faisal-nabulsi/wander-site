<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in to the Wander app</title>
<meta name="description" content="Continue with Google or Apple to sign in to the Wander app." />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#185FA5" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<style>
  /* Self-contained styling that mirrors the site's auth-card look. This page is
     opened inside ASWebAuthenticationSession, so it deliberately does NOT pull in
     the full site chrome (nav/footer/styles.css) — just enough to look like Wander. */
  :root {
    --brand: #185FA5;
    --brand-400: #3F8FDC;
    --grad: linear-gradient(135deg, #185FA5 0%, #2f7fd0 100%);
    --grad-soft: linear-gradient(180deg, #f3f7fc 0%, #ffffff 60%);
    --ink: #14202b;
    --ink-2: #4a5763;
    --ink-3: #8a97a3;
    --line: #e3e9f0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--grad-soft);
    display: flex; align-items: center; justify-content: center;
    padding: 32px 20px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: min(420px, 100%); background: #fff;
    border: 1px solid var(--line); border-radius: 20px;
    box-shadow: 0 24px 60px rgba(24,95,165,.12);
    padding: clamp(28px, 6vw, 40px); text-align: center;
  }
  .mark { display: grid; place-items: center; margin-bottom: 18px; }
  .mark svg { width: 48px; height: 48px; border-radius: 13px; box-shadow: 0 4px 14px rgba(24,95,165,.18); }
  h1 { font-size: 1.55rem; letter-spacing: -.02em; margin: 0 0 8px; }
  .sub { color: var(--ink-2); font-size: .96rem; margin: 0 0 26px; }
  button.g {
    width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    font-family: inherit; font-size: 1rem; font-weight: 600; color: var(--ink);
    background: #fff; border: 1.5px solid var(--line); border-radius: 12px;
    padding: 14px 18px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(20,32,43,.06);
    transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
  }
  button.g:hover { border-color: #b9d3ef; box-shadow: 0 8px 20px rgba(24,95,165,.14); transform: translateY(-1px); }
  button.g:disabled { opacity: .6; cursor: default; transform: none; box-shadow: none; }
  button.g svg { width: 18px; height: 18px; }
  /* Apple button — solid black with the white Apple logo. */
  button.apple { background: #000; color: #fff; border-color: #000; margin-top: 12px; }
  button.apple:hover { border-color: #111; background: #111; box-shadow: 0 8px 20px rgba(0,0,0,.22); transform: translateY(-1px); }
  button.apple svg { fill: #fff; }
  /* Two-factor code entry (shown only when a redirect sign-in needs a TOTP code). */
  #mfa { display: none; margin-top: 4px; text-align: left; }
  #mfa label { display: block; font-weight: 600; font-size: .9rem; color: var(--ink-2); margin-bottom: 8px; text-align: center; }
  #mfaCode {
    width: 100%; font-family: inherit; font-size: 1.35rem; font-weight: 700;
    letter-spacing: .35em; text-align: center; color: var(--ink);
    border: 1.5px solid var(--line); border-radius: 12px; padding: 14px 16px;
    box-sizing: border-box;
  }
  #mfaCode:focus { outline: none; border-color: var(--brand-400); box-shadow: 0 0 0 4px rgba(63,143,220,.15); }
  button.verify {
    width: 100%; margin-top: 12px; font-family: inherit; font-size: 1rem; font-weight: 700;
    color: #fff; background: var(--brand); border: 1.5px solid var(--brand); border-radius: 12px;
    padding: 14px 18px; cursor: pointer;
    transition: box-shadow .15s ease, transform .15s ease;
  }
  button.verify:hover { box-shadow: 0 8px 20px rgba(24,95,165,.24); transform: translateY(-1px); }
  button.verify:disabled { opacity: .6; cursor: default; transform: none; box-shadow: none; }
  .note {
    margin-top: 22px; font-size: .82rem; color: var(--ink-3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .spinner {
    width: 15px; height: 15px; border-radius: 50%;
    border: 2px solid rgba(24,95,165,.25); border-top-color: var(--brand);
    animation: spin .7s linear infinite; display: none;
  }
  .note.busy .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { margin-top: 16px; font-size: .9rem; font-weight: 600; min-height: 20px; }
  .msg.err { color: #c0392b; }
</style>
</head>
<body>
  <main class="card">
    <div class="mark">
      <svg viewBox="0 0 100 100" aria-hidden="true"><rect width="100" height="100" rx="24" fill="#185FA5"/><path d="M50 22c-11 0-20 9-20 20 0 15 20 36 20 36s20-21 20-36c0-11-9-20-20-20z" fill="#fff"/><circle cx="50" cy="42" r="8" fill="#185FA5"/></svg>
    </div>
    <h1>Sign in to Wander</h1>
    <p class="sub">Use your Google or Apple account to unlock Wander Pro in the app.</p>

    <button type="button" class="g" id="googleBtn">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.15-4.53H2.18v2.84A11 11 0 0012 23z"/><path fill="#FBBC05" d="M5.85 14.1a6.6 6.6 0 010-4.2V7.06H2.18a11 11 0 000 9.88l3.67-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 002.18 7.06l3.67 2.84C6.71 7.3 9.14 5.38 12 5.38z"/></svg>
      Continue with Google
    </button>

    <!-- Apple hidden until the Firebase Apple provider is enabled (needs the $99 Apple Developer
         Program). Remove the style="display:none" to re-enable; the flow is wired and ready. -->
    <button type="button" class="g apple" id="appleBtn" style="display:none">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.36 12.78c.03 2.87 2.52 3.82 2.55 3.84-.02.07-.4 1.36-1.31 2.7-.79 1.16-1.61 2.31-2.9 2.33-1.27.03-1.68-.75-3.13-.75-1.45 0-1.9.73-3.1.78-1.25.05-2.2-1.25-3-2.4-1.63-2.37-2.88-6.69-1.2-9.6.83-1.45 2.32-2.36 3.94-2.39 1.22-.02 2.38.82 3.13.82.75 0 2.16-1.02 3.64-.87.62.03 2.36.25 3.48 1.89-.09.06-2.08 1.21-2.05 3.61M13.99 4.6c.66-.8 1.11-1.92.99-3.03-.95.04-2.11.63-2.8 1.43-.62.71-1.16 1.85-1.02 2.94 1.06.08 2.14-.54 2.83-1.34"/></svg>
      Continue with Apple
    </button>

    <!-- Two-factor code entry: revealed only if the redirect sign-in returns
         auth/multi-factor-auth-required. The provider buttons are hidden then. -->
    <form id="mfa">
      <label for="mfaCode">Enter the 6-digit code from your authenticator app</label>
      <input id="mfaCode" type="text" inputmode="numeric" autocomplete="one-time-code"
             pattern="[0-9]*" maxlength="6" placeholder="123456" />
      <button type="submit" class="verify" id="mfaVerify">Verify &amp; continue</button>
    </form>

    <div class="msg" id="msg" role="status" aria-live="polite"></div>

    <div class="note" id="note">
      <span class="spinner" aria-hidden="true"></span>
      <span id="noteText">Signing you in to the Wander app…</span>
    </div>
  </main>

  <!-- Reuse the SAME Firebase app/config as the rest of the site (auth.js exports the
       initialised `auth`). We only need a few extra auth primitives for the redirect flow;
       import them from the exact same CDN version auth.js uses (10.12.2). -->
  <script type="module">
    import { auth } from "/auth.js";
    import {
      GoogleAuthProvider,
      OAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      getMultiFactorResolver,
      TotpMultiFactorGenerator,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const CALLBACK = "wander-auth://callback#";
    const googleBtn = document.getElementById("googleBtn");
    const appleBtn  = document.getElementById("appleBtn");
    const note      = document.getElementById("note");
    const noteText  = document.getElementById("noteText");
    const msg       = document.getElementById("msg");
    const mfaForm   = document.getElementById("mfa");
    const mfaCode   = document.getElementById("mfaCode");
    const mfaVerify = document.getElementById("mfaVerify");

    let handedOff = false; // guard so we only redirect back to the app once

    function busy(on) {
      note.classList.toggle("busy", !!on);
      googleBtn.disabled = !!on;
      appleBtn.disabled  = !!on;
    }

    /** Build a fresh provider for the given id. Google always shows the account
     *  chooser; Apple requests the email + name scopes. */
    function makeProvider(which) {
      if (which === "apple") {
        const provider = new OAuthProvider("apple.com");
        provider.addScope("email");
        provider.addScope("name");
        return provider;
      }
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: "select_account" }); // always show the account chooser
      return provider;
    }

    /** Start the redirect sign-in flow for a provider ("google" | "apple").
     *  signInWithPopup does NOT work inside ASWebAuthenticationSession (no
     *  window.open), so we MUST use signInWithRedirect. */
    async function startSignIn(which) {
      msg.textContent = "";
      msg.classList.remove("err");
      busy(true);
      try {
        await signInWithRedirect(auth, makeProvider(which));
        // Navigates away to the provider; execution stops here.
      } catch (e) {
        showError((e && e.message) || "Couldn't start sign-in.");
      }
    }

    function showError(text) {
      busy(false);
      msg.textContent = text || "Sign-in failed. Please try again.";
      msg.classList.add("err");
    }

    /** Hand the tokens back to the app via its custom URL scheme. */
    function handOffToApp(params) {
      if (handedOff) return;
      handedOff = true;
      const qs = new URLSearchParams(params).toString();
      // Custom-scheme navigation is what ASWebAuthenticationSession watches for.
      window.location.href = CALLBACK + qs;
    }

    async function adoptUser(user) {
      try {
        const idToken = await user.getIdToken();
        handOffToApp({
          idToken,
          refreshToken: user.refreshToken || "",
          email: user.email || "",
          uid: user.uid || "",
        });
      } catch (e) {
        handOffToApp({ error: (e && e.message) || String(e) });
      }
    }

    /* ---------- Two-factor (TOTP) challenge ----------
       If a redirect sign-in comes back needing a second factor, we DON'T hand an
       error to the app — we show a 6-digit input right here in the bridge, resolve
       it, and then hand off the resulting user's tokens exactly as usual. */
    let pendingResolver = null;

    function showMfaChallenge(err) {
      // Build the resolver from the error; the hints tell us which factor to use.
      try {
        pendingResolver = getMultiFactorResolver(auth, err);
      } catch (e) {
        handOffToApp({ error: (e && e.message) || String(e) });
        return;
      }
      busy(false);
      // Swap the UI: hide the provider buttons + spinner note, reveal the code form.
      googleBtn.style.display = "none";
      appleBtn.style.display = "none";
      note.style.display = "none";
      noteText.textContent = "Enter your authenticator code to finish signing in.";
      msg.textContent = "";
      msg.classList.remove("err");
      mfaForm.style.display = "block";
      mfaCode.focus();
    }

    async function submitMfa(e) {
      if (e) e.preventDefault();
      if (!pendingResolver) return;
      const code = (mfaCode.value || "").trim();
      if (!/^\d{6}$/.test(code)) {
        msg.textContent = "Enter the 6-digit code from your authenticator app.";
        msg.classList.add("err");
        return;
      }
      mfaVerify.disabled = true;
      msg.classList.remove("err");
      msg.textContent = "Verifying…";
      try {
        const hint = pendingResolver.hints[0];
        const assertion = TotpMultiFactorGenerator.assertionForSignIn(hint.uid, code);
        const cred = await pendingResolver.resolveSignIn(assertion);
        // Success — hand the tokens back to the app just like a normal sign-in.
        msg.textContent = "";
        note.style.display = "";
        noteText.textContent = "Signing you in to the Wander app…";
        busy(true);
        await adoptUser(cred.user);
      } catch (e2) {
        mfaVerify.disabled = false;
        const code2 = (e2 && e2.code) || "";
        msg.textContent = code2 === "auth/invalid-verification-code"
          ? "That 6-digit code was wrong or expired."
          : ((e2 && e2.message) || "Couldn't verify that code.");
        msg.classList.add("err");
      }
    }

    mfaForm.addEventListener("submit", submitMfa);

    /** ?provider=google|apple lets a native app deep-link straight into one flow. */
    function requestedProvider() {
      const p = (new URLSearchParams(location.search).get("provider") || "").toLowerCase();
      return p === "google" || p === "apple" ? p : null;
    }

    // 1) On load, complete any pending redirect sign-in. If it resolves with a user,
    //    hand off immediately. getRedirectResult resolves to null on a fresh visit.
    //    The provider that returns doesn't matter — we hand off the resulting user's
    //    tokens the same way whether it was Google or Apple.
    (async () => {
      busy(true);
      try {
        const result = await getRedirectResult(auth);
        if (result && result.user) {
          noteText.textContent = "Signing you in to the Wander app…";
          await adoptUser(result.user);
          return;
        }
      } catch (e) {
        // A 2FA-enabled account lands here needing a second factor — show the code
        // input in the bridge and resolve it, rather than failing back to the app.
        if (e && e.code === "auth/multi-factor-auth-required") {
          showMfaChallenge(e);
          return;
        }
        // Any other redirect error (e.g. account-exists-with-different-credential).
        handOffToApp({ error: (e && e.message) || String(e) });
        return;
      }
      // No pending redirect. If the app deep-linked with ?provider=, auto-start that
      // flow immediately; otherwise wait for an EXPLICIT button tap. We deliberately do
      // NOT hand off a passively-restored session, so a returning user always sees the
      // provider's account chooser instead of being silently signed into a cached account.
      const which = requestedProvider();
      if (which) {
        await startSignIn(which);
        return; // startSignIn navigates away on success
      }
      busy(false);
    })();

    // 2) Each button kicks off its provider's redirect flow.
    googleBtn.addEventListener("click", () => startSignIn("google"));
    appleBtn.addEventListener("click", () => startSignIn("apple"));
  </script>
</body>
</html>
