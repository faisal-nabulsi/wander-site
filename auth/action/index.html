<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wander — Account action</title>
<meta name="description" content="Reset your Wander password or verify your email." />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#185FA5" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<style>
  /* Self-contained (like /app-login/) so this critical flow can't be broken by other CSS. */
  :root { --brand:#185FA5; --brand-400:#3F8FDC; --grad:linear-gradient(135deg,#2b7fd4 0%,#185FA5 55%,#0f4c86 100%);
          --grad-soft:linear-gradient(180deg,#f3f7fc 0%,#fff 60%); --ink:#14202b; --ink-2:#4a5763; --ink-3:#8a97a3; --line:#e3e9f0; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink);
         background:var(--grad-soft); display:flex; align-items:center; justify-content:center; padding:32px 20px; -webkit-font-smoothing:antialiased; }
  .card { width:min(420px,100%); background:#fff; border:1px solid var(--line); border-radius:20px;
          box-shadow:0 24px 60px rgba(24,95,165,.12); padding:clamp(28px,6vw,40px); text-align:center; }
  .mark { display:grid; place-items:center; margin-bottom:18px; }
  .mark svg { width:48px; height:48px; border-radius:13px; box-shadow:0 4px 14px rgba(24,95,165,.18); }
  h1 { font-size:1.5rem; letter-spacing:-.02em; margin:0 0 8px; }
  .sub { color:var(--ink-2); font-size:.95rem; margin:0 0 24px; }
  form { text-align:left; display:none; }
  label { display:block; font-size:.85rem; font-weight:600; color:var(--ink-2); margin:14px 0 6px; }
  .pw-wrap { position:relative; }
  input[type=password], input[type=text] { width:100%; font:inherit; font-size:1rem; color:var(--ink);
          border:1.5px solid var(--line); border-radius:12px; padding:13px 44px 13px 14px; }
  input:focus { outline:none; border-color:var(--brand-400); box-shadow:0 0 0 4px rgba(63,143,220,.15); }
  .pw-toggle { position:absolute; top:50%; right:6px; transform:translateY(-50%); width:34px; height:34px; display:flex;
          align-items:center; justify-content:center; border:none; background:transparent; color:#7a7a7a; cursor:pointer; border-radius:8px; }
  button.primary { width:100%; margin-top:20px; font:inherit; font-size:1rem; font-weight:700; color:#fff; background:var(--grad);
          border:none; border-radius:12px; padding:14px 18px; cursor:pointer; box-shadow:0 12px 30px rgba(24,95,165,.28); }
  button.primary:disabled { opacity:.6; cursor:default; box-shadow:none; }
  .msg { margin-top:16px; font-size:.9rem; font-weight:600; min-height:20px; }
  .msg.err { color:#c0392b; } .msg.ok { color:#1a7f37; }
  .link { display:inline-block; margin-top:18px; color:var(--brand); font-weight:600; font-size:.92rem; text-decoration:none; }
  .link:hover { text-decoration:underline; }
  .spinner { width:22px; height:22px; margin:6px auto 0; border-radius:50%; border:3px solid rgba(24,95,165,.2);
          border-top-color:var(--brand); animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <main class="card">
    <div class="mark">
      <svg viewBox="0 0 100 100" aria-hidden="true"><rect width="100" height="100" rx="24" fill="#185FA5"/><path d="M50 22c-11 0-20 9-20 20 0 15 20 36 20 36s20-21 20-36c0-11-9-20-20-20z" fill="#fff"/><circle cx="50" cy="42" r="8" fill="#185FA5"/></svg>
    </div>
    <h1 id="title">Wander</h1>
    <p class="sub" id="sub">One moment…</p>
    <div class="spinner" id="spinner"></div>

    <!-- Password reset form (revealed once the reset code is verified) -->
    <form id="resetForm">
      <label for="pw">New password</label>
      <div class="pw-wrap">
        <input id="pw" type="password" autocomplete="new-password" minlength="6" placeholder="At least 6 characters" />
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
          <svg id="pwEye" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <label for="pw2">Confirm new password</label>
      <input id="pw2" type="password" autocomplete="new-password" minlength="6" placeholder="Re-enter it" />
      <button type="submit" class="primary" id="resetSubmit">Update password</button>
    </form>

    <div class="msg" id="msg" role="status" aria-live="polite"></div>
    <a class="link" id="doneLink" href="/login/" style="display:none">Go to sign in →</a>
  </main>

  <script type="module">
    import { auth } from "/auth.js";
    import {
      verifyPasswordResetCode, confirmPasswordReset, applyActionCode, checkActionCode,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const $ = (id) => document.getElementById(id);
    const title = $("title"), sub = $("sub"), spinner = $("spinner"), msg = $("msg"),
          resetForm = $("resetForm"), doneLink = $("doneLink");

    const params = new URLSearchParams(location.search);
    const mode = params.get("mode");
    const oobCode = params.get("oobCode");

    function fail(text) {
      spinner.style.display = "none";
      resetForm.style.display = "none";
      title.textContent = "Link expired";
      sub.textContent = "";
      msg.textContent = text || "This link is invalid or has expired. Request a new one from the sign-in page.";
      msg.className = "msg err";
      doneLink.textContent = "Back to sign in →";
      doneLink.style.display = "inline-block";
    }
    function done(text) {
      spinner.style.display = "none";
      resetForm.style.display = "none";
      msg.textContent = text;
      msg.className = "msg ok";
      doneLink.style.display = "inline-block";
    }

    // Show/hide password.
    const pw = $("pw"), pw2 = $("pw2");
    $("pwToggle").addEventListener("click", () => {
      const show = pw.type === "password";
      pw.type = pw2.type = show ? "text" : "password";
      $("pwToggle").setAttribute("aria-label", show ? "Hide password" : "Show password");
    });

    (async () => {
      if (!mode || !oobCode) { fail("This link is missing its code. Request a new one from the sign-in page."); return; }
      try {
        if (mode === "resetPassword") {
          const email = await verifyPasswordResetCode(auth, oobCode); // throws if invalid/expired
          spinner.style.display = "none";
          title.textContent = "Set a new password";
          sub.textContent = "For " + email;
          resetForm.style.display = "block";
          resetForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const a = pw.value, b = pw2.value;
            if (a.length < 6) { msg.textContent = "Password must be at least 6 characters."; msg.className = "msg err"; return; }
            if (a !== b) { msg.textContent = "The two passwords don't match."; msg.className = "msg err"; return; }
            $("resetSubmit").disabled = true;
            msg.textContent = "Updating…"; msg.className = "msg";
            try {
              await confirmPasswordReset(auth, oobCode, a);
              done("✓ Password updated. You can now sign in with your new password.");
            } catch (err) {
              $("resetSubmit").disabled = false;
              msg.textContent = (err && err.message) || "Couldn't update the password. The link may have expired — request a new one.";
              msg.className = "msg err";
            }
          });
        } else if (mode === "verifyEmail") {
          await applyActionCode(auth, oobCode);
          title.textContent = "Email verified";
          sub.textContent = "";
          done("✓ Your email is verified. You're all set.");
          doneLink.href = "/account/"; doneLink.textContent = "Go to your account →";
        } else if (mode === "recoverEmail") {
          const info = await checkActionCode(auth, oobCode);
          await applyActionCode(auth, oobCode);
          title.textContent = "Email change reverted";
          sub.textContent = "";
          done("✓ Your account email has been restored" + (info?.data?.email ? " to " + info.data.email : "") + ".");
        } else if (mode === "revertSecondFactorAddition") {
          // The "2-step verification was added" email's "remove it" link.
          await applyActionCode(auth, oobCode);
          title.textContent = "Two-factor removed";
          sub.textContent = "";
          done("✓ The two-factor sign-in that was added to your account has been removed.");
        } else {
          fail("Unsupported action.");
        }
      } catch (err) {
        fail((err && err.message) || undefined);
      }
    })();
  </script>
</body>
</html>
